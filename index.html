 <!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>KiranaConnect</title>

<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<style>

body{
font-family:Arial;
margin:0;
background:#f3f4f6;
}

.header{
background:#0f172a;
color:white;
padding:15px;
text-align:center;
font-size:22px;
}

.container{
padding:20px;
}

.card{
background:white;
padding:15px;
border-radius:10px;
margin-bottom:20px;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

input{
padding:8px;
margin:5px;
}

button{
padding:8px 12px;
background:#2563eb;
border:none;
color:white;
border-radius:5px;
cursor:pointer;
}

h3{
margin-top:0;
}

</style>

</head>

<body>

<div id="root"></div>

<script type="text/babel">

const {useState,useEffect}=React;

function App(){

const [customers,setCustomers]=useState([]);
const [products,setProducts]=useState([]);
const [sales,setSales]=useState([]);

const [cname,setCname]=useState("");
const [cphone,setCphone]=useState("");

const [pname,setPname]=useState("");
const [pprice,setPprice]=useState("");

const [sale,setSale]=useState("");

useEffect(()=>{
const data=localStorage.getItem("kiranaData");
if(data){
const parsed=JSON.parse(data);
setCustomers(parsed.customers||[]);
setProducts(parsed.products||[]);
setSales(parsed.sales||[]);
}
},[]);

useEffect(()=>{
localStorage.setItem("kiranaData",JSON.stringify({
customers,
products,
sales
}));
},[customers,products,sales]);

function addCustomer(){

if(!cname||!cphone)return;

setCustomers([...customers,{name:cname,phone:cphone}]);

setCname("");
setCphone("");

}

function addProduct(){

if(!pname||!pprice)return;

setProducts([...products,{name:pname,price:pprice}]);

setPname("");
setPprice("");

}

function addSale(){

if(!sale)return;

setSales([...sales,{item:sale,date:new Date().toLocaleDateString()}]);

setSale("");

}

return(

<div>

<div className="header">
KiranaConnect Shop Dashboard
</div>

<div className="container">

<div className="card">

<h3>Add Customer</h3>

<input
placeholder="Name"
value={cname}
onChange={(e)=>setCname(e.target.value)}
/>

<input
placeholder="Phone"
value={cphone}
onChange={(e)=>setCphone(e.target.value)}
/>

<button onClick={addCustomer}>
Add
</button>

<h4>Customers</h4>

{customers.map((c,i)=>(
<div key={i}>
{c.name} - {c.phone}
</div>
))}

</div>


<div className="card">

<h3>Add Product</h3>

<input
placeholder="Product Name"
value={pname}
onChange={(e)=>setPname(e.target.value)}
/>

<input
placeholder="Price"
value={pprice}
onChange={(e)=>setPprice(e.target.value)}
/>

<button onClick={addProduct}>
Add
</button>

<h4>Products</h4>

{products.map((p,i)=>(
<div key={i}>
{p.name} - ₹{p.price}
</div>
))}

</div>


<div className="card">

<h3>Record Sale</h3>

<input
placeholder="Item Sold"
value={sale}
onChange={(e)=>setSale(e.target.value)}
/>

<button onClick={addSale}>
Add Sale
</button>

<h4>Sales</h4>

{sales.map((s,i)=>(
<div key={i}>
{s.item} - {s.date}
</div>
))}

</div>

</div>

</div>

)

}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>)

</script>

</body>
</html>
